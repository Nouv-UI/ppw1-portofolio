<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>untuk menampilkan teks dari kanan ke kiri (rtl), browser harus support bi-directional override (bdo) </p>
secara default, bdo dimulai dari kiri ke kanan (bdo dir="ltr") <br>
    <bdo dir="ltr">
        halo kamu siapa
    </bdo>
    <br>
    untuk right to left, gunakan bdo dir="rtl"<br>
    <bdo dir="rtl">
        halo kamu siapa
    </bdo>

    <blockquote>
        halo nihao
    </blockquote>
</body>
</html>
