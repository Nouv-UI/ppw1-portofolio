<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Pendaftaran Mahasiswa Baru</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <main class="bg-light py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="card shadow-sm">
                        <div class="card-body p-4">
                            <div class="mb-4 text-center">
                                <h1 class="h3">Pendaftaran Mahasiswa Baru</h1>
                            </div>

                            <div id="successAlert" class="alert alert-success alert-dismissible fade show d-none" role="alert">
                                Pendaftaran berhasil disimpan.
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>

                            <form id="registrationForm" novalidate>
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label for="namaLengkap" class="form-label">Nama Lengkap</label>
                                        <input type="text" class="form-control" id="namaLengkap" name="namaLengkap"
                                            placeholder="Masukkan nama lengkap" required>
                                        <div class="valid-feedback">Nama lengkap OK.</div>
                                        <div class="invalid-feedback">Nama lengkap harus diisi.</div>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="nim" class="form-label">NIM</label>
                                        <input type="text" class="form-control" id="nim" name="nim"
                                            placeholder="Masukkan NIM" required>
                                        <div class="valid-feedback">NIM valid.</div>
                                        <div class="invalid-feedback">NIM harus diisi.</div>
                                    </div>
                                </div>

                                <div class="mb-3 mt-3">
                                    <label for="email" class="form-label">Email</label>
                                    <input type="email" class="form-control" id="email" name="email"
                                        placeholder="nama@domain.com" required>
                                    <div class="valid-feedback">Email valid.</div>
                                    <div class="invalid-feedback">Masukkan email yang benar.</div>
                                </div>

                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label for="programStudi" class="form-label">Program Studi</label>
                                        <select class="form-select" id="programStudi" name="programStudi" required>
                                            <option value="" selected>Pilih Program Studi</option>
                                            <option value="TRPL">TRPL</option>
                                            <option value="TRI">TRI</option>
                                            <option value="TRE">TRE</option>
                                            <option value="TRIK">TRIK</option>
                                        </select>
                                        <div class="invalid-feedback">Pilih salah satu program studi.</div>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="semester" class="form-label">Semester</label>
                                        <select class="form-select" id="semester" name="semester" required>
                                            <option value="" selected>Pilih Semester</option>
                                            <option value="1">1</option>
                                            <option value="2">2</option>
                                            <option value="3">3</option>
                                            <option value="4">4</option>
                                            <option value="5">5</option>
                                            <option value="6">6</option>
                                        </select>
                                        <div class="invalid-feedback">Pilih semester.</div>
                                    </div>
                                </div>

                                <div class="mb-3 mt-3">
                                    <label for="alamat" class="form-label">Alamat</label>
                                    <textarea class="form-control" id="alamat" name="alamat" rows="4"
                                        placeholder="Masukkan alamat lengkap" required></textarea>
                                    <div class="invalid-feedback">Alamat harus diisi.</div>
                                </div>

                                <div class="mb-4">
                                    <label for="fotoProfil" class="form-label">Foto Profil</label>
                                    <input class="form-control" type="file" id="fotoProfil" name="fotoProfil"
                                        accept="image/*">
                                </div>

                                <div class="d-flex gap-2">
                                    <button type="submit" class="btn btn-primary">Simpan</button>
                                    <button type="reset" class="btn btn-outline-secondary">Reset</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe"
        crossorigin="anonymous"></script>
    <script>
        const form = document.getElementById('registrationForm');
        const alertSuccess = document.getElementById('successAlert');

        function validateField(element) {
            if (element.checkValidity()) {
                element.classList.remove('is-invalid');
                element.classList.add('is-valid');
                return true;
            }
            element.classList.remove('is-valid');
            element.classList.add('is-invalid');
            return false;
        }

        function hideAlert() {
            alertSuccess.classList.add('d-none');
        }

        function resetValidation() {
            const controls = form.querySelectorAll('.form-control, .form-select');
            controls.forEach(control => {
                control.classList.remove('is-valid', 'is-invalid');
            });
        }

        form.addEventListener('submit', function (event) {
            event.preventDefault();
            event.stopPropagation();

            const requiredFields = [
                document.getElementById('namaLengkap'),
                document.getElementById('nim'),
                document.getElementById('email'),
                document.getElementById('programStudi'),
                document.getElementById('semester'),
                document.getElementById('alamat')
            ];

            let allValid = true;
            requiredFields.forEach(field => {
                const valid = validateField(field);
                if (!valid) {
                    allValid = false;
                }
            });

            if (allValid) {
                alertSuccess.classList.remove('d-none');
                form.classList.add('was-validated');
            } else {
                hideAlert();
                form.classList.remove('was-validated');
            }
        });

        form.addEventListener('reset', function () {
            hideAlert();
            resetValidation();
        });

        const fieldsToWatch = ['namaLengkap', 'nim', 'email', 'programStudi', 'semester', 'alamat'];
        fieldsToWatch.forEach(fieldId => {
            const field = document.getElementById(fieldId);
            field.addEventListener('input', () => validateField(field));
        });
    </script>
</body>
</html>
