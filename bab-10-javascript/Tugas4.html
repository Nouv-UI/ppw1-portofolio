<!-- Tulis code yg berisikan javascript menanyakan apakah anda praktikan PPW1?, 
 jika iya ditanya Nama, NIM, dan Angkatan. Lalu tampilkan hasilnya dalam tabel (bootstrap), 
 jika tidak tampil tulisan “Anda bukan praktikan PPW1, anda tidak boleh masuk!”.  -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas 4 - If else</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">
    <div id="konten"></div>
    

    <script>
        let cek = prompt("Apakah anda praktikan PPW? (Ya/Bukan)").toLowerCase()
        let isi = document.getElementById("konten");

        if (cek === "ya") {
            let nama = prompt("Masukkan Nama Anda: ");
            let nim = prompt("Masukkan NIM Anda: ");
            let angkatan = prompt("Masukkan Tahun Angkatan Anda: ")

            let tabel = `
            <h3>Tabel Data Praktikan PPW 1</h3>
            <table class="table table- bordered table-striped mt-3">
                <thead class="table-dark">
                    <tr>
                        <th>Nama</th>
                        <th>NIM</th>
                        <th>Angkatan</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>${nama}</td>
                        <td>${nim}</td>
                        <td>${angkatan}</td>
                    </tr>
                </tbody>
            </table>
            `;

            isi.innerHTML = tabel;

        } else {
            isi.innerHTML = `
                <h3>Anda Bukan Praktikan PPW 1</h3>
                <p>Data hanya dapat diakses oleh praktikan PPW 1</p>`;
        }
    </script>
</body>
</html>
