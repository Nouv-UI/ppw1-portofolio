<!-- Silahkan buat 1 file html yang isinya memanggil code
javascript yang berasal dari embed, inline, eksternal. (Isi teks html dan
javascript bisa anda variasikan sendiri). -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas 1 - Memanggil JS</title>
    <script src="Tugas1.js"></script>
</head>
<body>
    <h3>Cara memanggil Javascript</h3>
    <p>1. Menggunakan Script eksternal dari header</p>
    <p>2. Inline. Contohnya klik tombol di bawah ini:</p>


    <button onclick="alert('Tombol ini adalah contoh kode inline')">(inline)</button>

    <script>
        console.log("ini adalah contoh kode console log"); //muncul di console
        document.write("<p>Ini adalah contoh kode document.write</p>");
    </script>
</body>
</html>
