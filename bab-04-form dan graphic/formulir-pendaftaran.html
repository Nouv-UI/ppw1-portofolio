<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Pendaftaran Study Tour</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0ebf8; 
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center; 
        }
        
        .form-wrapper {
            width: 100%;
            max-width: 650px;
        }

        .container {
            background-color: #ffffff;
            width: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 30px;
            box-sizing: border-box;
            border-top: 8px solid #673ab7; 
        }

        .header-img {
            width: 100%;
            height: 250px; 
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 12px; 
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        input[type="text"],
        input[type="email"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .destinasi-option {
            display: flex;
            align-items: center; 
            margin-bottom: 15px;
            padding: 10px;
            border: 1px solid #eee;
            border-radius: 6px;
        }

        .destinasi-option input {
            margin-right: 15px;
        }

        .destinasi-option img {
            margin-left: auto; 
            border-radius: 4px;
            width: 120px; 
            height: 80px;
            object-fit: cover;
        }

        .btn-group {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-submit {
            background-color: #673ab7; 
            color: white;
            padding: 10px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }

        .btn-reset {
            background-color: #f1f3f4;
            color: #3c4043;
            padding: 10px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="form-wrapper">
        
        <img class="header-img" src="https://images.tokopedia.net/img/KRMmCm/2022/6/16/56b7b2bc-aeab-4fe9-bb3b-b97ce6ccef67.jpg" alt="Banner Pendaftaran">
        
        <div class="container">
            <fieldset style="border: none; padding: 0; margin: 0;">
                <legend style="font-size: 24px; font-weight: bold; margin-bottom: 20px;">Formulir Pendaftaran Study Tour</legend>
                
                <form action="" method="post">
                    
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="nama">Nama Lengkap:</label>
                        <input type="text" id="nama" name="nama" required>
                    </div>

                    <div class="form-group">
                        <label for="kelas">Pilih Kelas:</label>
                        <select id="kelas" name="kelas">
                            <option value="" disabled selected>-- Pilih --</option>
                            <option value="PL2AA">PL2AA</option>
                            <option value="PL2BB">PL2BB</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="alasan">Alasan Mengikuti Study Tour:</label>
                        <textarea id="alasan" name="alasan" rows="5" required></textarea>
                    </div>

                    <div class="form-group">
                        <label>Pilih Salah Satu Destinasi Utama:</label><br><br>
                        
                        <div class="destinasi-option">
                            <input type="radio" id="dest1" name="destinasi" value="Parangtritis" required>
                            <label for="dest1">Pantai Parangtritis</label>
                            <img src="https://cdn.idntimes.com/content-images/community/2020/09/parangtritis-e4f81fac27315376ab651a70df0a372e_600x400.jpg" alt="Pantai Parangtritis">
                        </div>

                        <div class="destinasi-option">
                            <input type="radio" id="dest2" name="destinasi" value="Malioboro">
                            <label for="dest2">Malioboro</label>
                            <img src="https://www.dejogja.co.id/wp-content/uploads/2020/01/Malioboro-600x400.jpg" alt="Malioboro">
                        </div>

                        <div class="destinasi-option">
                            <input type="radio" id="dest3" name="destinasi" value="Kalitalang">
                            <label for="dest3">Kalitalang</label>
                            <img src="https://imgcdn.espos.id/@espos/images/2024/09/highline-kalitalang-1.jpg?quality=60" alt="Kalitalang">
                        </div>
                    </div>

                    <div class="btn-group">
                        <input type="reset" class="btn-reset" value="Hapus Isian">
                        <input type="submit" class="btn-submit" value="Kirim Pendaftaran">
                    </div>

                </form>
            </fieldset>
        </div>
    </div>

</body>
</html>
