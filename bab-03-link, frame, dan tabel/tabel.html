<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h2 {
            text-align: center;
        }

        table {
            width: 50%;
            border-collapse: collapse;
            margin: auto;
        }

        th {
            background-color: antiquewhite;
        }

        th, td {
            text-align: left; 
            border: 1px solid rgb(0, 0, 0);
            padding: 8px;
        }
    </style>
</head>
<body>

    <table>
        <thead>

                <th>Nama</th>
                <th>Usia</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>naufal</td>
                <td>17</td>
            </tr>
            <tr>
                <td>mulyono</td>
                <td>45</td>
            </tr>
            <tr>
                <td>Saul</td>
                <td>33</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
